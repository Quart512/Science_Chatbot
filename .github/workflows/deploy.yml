name: Deploy Science Chatbot

on:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: uv 설치
        uses: astral-sh/setup-uv@v3

      - name: 테스트 (톨게이트)
        run: |
          uv sync
          uv run pytest

  deploy:
    needs: test # test job이 실패(또는 취소)하면 이 job은 시작조차 안 함
    runs-on: ubuntu-24.04-arm
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 이미지 빌드 + push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: quart512/science-chatbot:latest

      - name: 프론트 이미지 빌드 + push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: quart512/science-chatbot-frontend:latest

      - name: docker-compose.yml EC2로 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/science-chatbot"

      - name: EC2 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/science-chatbot
            docker compose --profile frontend pull
            docker compose --profile frontend up -d
            docker image prune -f
